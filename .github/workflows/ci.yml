name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Verify Code and Dependencies
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libglib2.0-0

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify wrapper imports
      run: |
        python -c "import sys, os; sys.path.insert(0, os.path.join(os.getcwd(), 'modules', 'Dental_002', 'src')); sys.path.insert(0, os.path.join(os.getcwd(), 'modules', 'Dental_003')); from modules.registry import PredictorRegistry; from modules.caries_predictor import CariesPredictorWrapper; from modules.boneloss_predictor import BoneLossPredictorWrapper; print('Sanity check passed!')"

  docker-build:
    name: Verify Docker Build
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build Docker image
      run: |
        docker build -t panoramic-reader:latest .
